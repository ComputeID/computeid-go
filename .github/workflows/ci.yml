name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: unit (SDK only, no Postgres)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          check-latest: true
          cache: true
      - run: go vet ./...
      - run: COMPUTEID_SKIP_INTEGRATION=1 go test -race -count=1 ./...
      - run: go build ./...

  integration:
    name: integration (server + E2E against Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: computeid
          POSTGRES_PASSWORD: computeid
          POSTGRES_DB: computeid_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U computeid"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      COMPUTEID_TEST_DATABASE_URL: postgres://computeid:computeid@localhost:5432/computeid_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          check-latest: true
          cache: true
      # -p 1 serializes the two integration-test binaries so they don't
      # race each other on schema resets when sharing one Postgres.
      - run: go test -race -count=1 -p 1 ./server/... ./...

  docker:
    name: docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t computeid-server:ci .
      - run: docker compose config --quiet
